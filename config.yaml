# AlphaBot Strategy Configuration (non-secret parameters)
# Override defaults from config.py

regime_detection:
  adx_period: 14
  atr_period: 14
  adx_trending_threshold: 20
  adx_ranging_threshold: 18
  atr_volatility_multiplier: 2.0   # ATR spike > 2x 20-period avg = high vol

indicators:
  rsi_period: 14
  volume_sma_period: 20
  ema_slope_period: 5
  ema_long_period: 200
  supertrend_period: 10
  supertrend_multiplier: 3.0

# --- Multi-Timeframe Stack ---
multi_timeframe:
  entry_timeframes:
    - "15m"        # Primary entry timeframe
  bias_timeframes:
    - "1h"         # Trend filter
    - "4h"         # Macro context (optional)
  max_htf_staleness_bars: 2.5   # FIX[5]: reject stale HTF confirmation frames

execution:
  order_fill_timeout_seconds: 6.0   # FIX[1]: wait window before persisting a new position

market_data:
  rest_fallback_enabled: true
  poll_interval_seconds: 30

strategies:
  supertrend_rsi:
    rsi_long_min: 50
    rsi_short_max: 58       # raised from 50 — allows SHORT entries on pullback completions (RSI 50-58)
    volume_multiplier: 1.1
    atr_sl_multiplier: 1.6
    atr_tp1_multiplier: 2.5
    atr_tp2_multiplier: 4.0
    max_extension_atr: 2.0  # raised from 1.5 — allows SHORT entries in strong downmoves

  supertrend_pullback:
    rsi_long_min: 54
    rsi_short_max: 52       # raised from 46 — allows SHORT pullback entries up to RSI 52
    volume_multiplier: 1.15
    adx_min: 20
    pullback_band_atr: 0.6
    atr_sl_multiplier: 1.4
    atr_tp1_multiplier: 2.8
    atr_tp2_multiplier: 4.6
    max_extension_atr: 1.2

  supertrend_trail:
    rsi_long_min: 52
    rsi_short_max: 55       # raised from 48 — allows SHORT trend-continuation entries up to RSI 55
    volume_multiplier: 1.1
    adx_min: 18
    breakout_buffer_atr: 0.1
    atr_sl_multiplier: 1.2
    atr_tp1_multiplier: 1.8
    atr_tp2_multiplier: 2.4
    max_extension_atr: 1.6

  orderflow_liquidity_sweep:
    lookback: 20
    min_wick_ratio: 0.45
    min_imbalance: 0.12
    rsi_long_max: 52
    rsi_short_min: 48
    volume_multiplier: 1.1
    stop_buffer_atr: 0.2
    atr_tp1_multiplier: 1.8
    atr_tp2_multiplier: 3.2
    max_reclaim_atr: 1.4

  ema_adx_volume:
    crossover_only: true        # only fresh EMA crosses; no continuation entries
    min_net_rr: 1.30            # stricter net R:R than global 1.15
    adx_min: 25                 # require stronger trend for ema_adx
    volume_multiplier: 1.3      # require stronger volume surge
    atr_sl_multiplier: 1.4      # tighten SL so net R:R clears minimum more reliably
    atr_tp1_multiplier: 2.8     # keep R:R ~ 2.0 (2.8/1.4)
    atr_tp2_multiplier: 4.0
    max_entry_range_atr: 1.6

  liquidity_sweep_orderflow:
    enabled: true
    swing_lookback: 10
    sweep_min_wick_pct: 0.05
    delta_window: 5
    cvd_slope_window: 20
    min_delta_ratio: 0.10
    htf_ema_fast: 20
    htf_ema_slow: 50
    min_confidence: 0.45
    atr_period: 14
    sl_atr_mult: 1.5
    tp1_atr_mult: 2.5
    tp2_atr_mult: 4.0

signal_scoring:
  regime_alignment_weight: 30
  primary_indicator_weight: 25
  confirmation_weight: 20
  volume_weight: 15
  higher_tf_weight: 10
  min_confidence: 62

risk:
  risk_per_trade_pct: 0.5
  max_risk_per_trade_pct: 2.0
  daily_loss_cap_pct: 1.0
  max_drawdown_pct: 5.0
  max_concurrent_positions: 1
  max_leverage: 5
  min_risk_reward: 1.5
  min_net_risk_reward: 1.05
  estimated_roundtrip_fee_rate: 0.001   # 0.05% per side taker = 0.10% roundtrip (was 0.0008)
  min_stop_distance_pct: 0.3
  max_consecutive_losses: 2
  consecutive_loss_cooldown_minutes: 30
  blocked_strategy_directions:
    - "ema_adx_volume"
  high_volatility_risk_reduction: 0.5
  time_stop_hours: 4
  time_stop_progress_pct: 20
  breakeven_activation_r: 1.3

take_profit:
  tp1_r_multiple: 1.0
  tp1_close_pct: 50
  tp2_r_multiple: 2.0
  tp2_close_pct: 30
  trailing_pct: 20

cooldown:
  min_candles_between_trades: 3
  stale_order_minutes: 240
